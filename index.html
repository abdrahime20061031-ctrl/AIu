/* HEADER */
header{

/* SLIDER */
.slider{
  overflow:hidden;
  width:100%;
  max-width:100%;
  margin-top:30px;
}

.slides{
  display:flex;
  animation:slide 12s linear infinite;
}

.slides img{
  width:100%;
  height:auto;
  object-fit:cover;
  flex-shrink:0;
}

@keyframes slide{
  0%{transform:translateX(0);}
  33%{transform:translateX(-100%);}
  66%{transform:translateX(-200%);}
  100%{transform:translateX(0);}
}

@media(max-width:768px){
  .slides img{
    height:200px;
  }
}

@media(max-width:480px){
  .slides img{
    height:150px;
  }
}

/* GALLERY */
.gallery{
  margin:50px 0;
  text-align:center;
}

.gallery h2{
  margin-bottom:20px;
  font-size:28px;
}

.gallery-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.gallery-container img{
  width:calc(20% - 10px);
  height:150px;
  object-fit:cover;
  border-radius:10px;
  transition:0.3s;
  cursor:pointer;
}

.gallery-container img:hover{
  transform:scale(1.05);
}

@media(max-width:900px){
  .gallery-container img{
    width:calc(33.33% - 10px);
    height:120px;
  }
}

@media(max-width:768px){
  .gallery-container img{
    width:calc(50% - 10px);
    height:100px;
  }
}

/* MAP */
.map{
  display:flex;
  justify-content:space-around;
  align-items:center;
  flex-wrap:wrap;
  padding:40px;
}

.map iframe{
  width:400px;
  height:250px;
  border:none;
  border-radius:10px;
}

/* TIMETABLE */
.timetable{
  background:white;
  color:black;
  padding:30px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border:2px solid #13afe3;
  text-align:center;

/* FOOTER */
