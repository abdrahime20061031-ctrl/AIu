<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Sheet Access</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
body, html { width:100%; height:100%; background: linear-gradient(to right,#061d3b,#067ddb); display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; }
#passwordScreen { position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; z-index:10; animation: fadeIn 1s ease; }
#passwordScreen input { padding:15px 20px; font-size:18px; border-radius:10px; border:none; margin-bottom:20px; width:250px; }
#passwordScreen button { padding:10px 20px; font-size:18px; border-radius:10px; border:none; background:#25d366; color:white; cursor:pointer; transition:0.3s; }
#passwordScreen button:hover { background:#1ebe5b; }
#errorMsg { margin-top:15px; color:#ff4c4c; font-size:16px; display:none; animation:shake 0.3s; }
@keyframes shake { 0%{transform:translateX(0);} 25%{transform:translateX(-5px);} 50%{transform:translateX(5px);} 75%{transform:translateX(-5px);} 100%{transform:translateX(0);} }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
iframe { width:100%; height:70vh; border:none; display:none; animation:fadeIn 1s ease; margin-bottom:10px; }
#deleteBtn { padding:10px 20px; font-size:18px; border-radius:10px; border:none; background:#ff4c4c; color:white; cursor:pointer; transition:0.3s; display:none; }
#deleteBtn:hover { background:#e03030; }
</style>
</head>
<body>

<!-- شاشة كلمة المرور -->
<div id="passwordScreen">
  <h2>Enter Password</h2>
  <input type="password" id="pwdInput" placeholder="Password">
  <button onclick="checkPassword()">Submit</button>
  <p id="errorMsg">Incorrect Password!</p>
</div>

<!-- iframe للـ Google Sheet -->
<iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6VcqOFHk020s7MknI2F1rMQTZI_Ar8g-MHl60Qdo7xnJal-lZCu4tDps6Rl7RCP3SS7Jcbcza55Vh/pubhtml?gid=0&single=true"></iframe>

<!-- زر حذف البيانات -->
<button id="deleteBtn" onclick="deleteAll()">Delete All Data</button>

<script>
// رابط سكربت Google Script الذي يحذف البيانات
const DELETE_URL = ""; 

// التحقق من كلمة المرور
function checkPassword(){
    const input = document.getElementById('pwdInput').value;
    if(input === "2027-14-14-17"){
        // إخفاء شاشة كلمة المرور
        document.getElementById('passwordScreen').style.display='none';
        // إظهار iframe و زر الحذف
        document.getElementById('sheetFrame').style.display='block';
        document.getElementById('deleteBtn').style.display='block';
    } else {
        const error = document.getElementById('errorMsg');
        error.style.display='block';
        setTimeout(()=>{error.style.display='none';},2000);
        document.getElementById('pwdInput').value='';
    }
}

// دالة حذف البيانات مع تأكيد
function deleteAll() {
    if(confirm("هل أنت متأكد من حذف جميع البيانات؟")) {
        fetch(DELETE_URL, {
            method: "POST",
            body: JSON.stringify({action:"delete"})
        })
        .then(res => res.text())
        .then(msg => alert(msg))
        .catch(err => alert("Delete failed"));
    }
}
</script>

</body>
</html>
